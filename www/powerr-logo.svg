  <desc
     id="desc1">PowerR wordmark. The 'O' is rendered as a ring containing a stylised
        raised fist, evoking statistical power. Brand red (#9D4844) for the
        wordmark and ring; charcoal grey (#3F3F3F) for the fist and the
        capital R that signals 'in R'.</desc>
